databases:
  - name: crm
    plan: free
    databaseName: crm
    user: postgres

services:
  - type: web
    plan: free
    name: crm
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn crm.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crm
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4